<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Tracker Konfiguration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      color: #f0c040;
      font-size: 1.4em;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    .section {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      color: #f0c040;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    /* Radio-Gruppe */
    .radio-option {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #0f3460;
      cursor: pointer;
    }
    .radio-option:last-child { border-bottom: none; }

    .radio-option input[type="radio"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      accent-color: #f0c040;
      flex-shrink: 0;
    }
    .radio-option label {
      cursor: pointer;
      line-height: 1.3;
    }

    /* Zahlen-Inputs */
    .input-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #0f3460;
    }
    .input-row:last-child { border-bottom: none; }

    .input-row label {
      flex: 1;
      color: #c0c0c0;
    }

    .input-row .stat-label {
      color: #f0c040;
      font-weight: bold;
      margin-right: 8px;
      min-width: 36px;
    }

    .input-row input[type="number"] {
      width: 80px;
      background: #0f3460;
      border: 1px solid #f0c040;
      border-radius: 6px;
      color: #fff;
      font-size: 1em;
      padding: 6px 10px;
      text-align: center;
    }
    .input-row input[type="number"]:focus {
      outline: none;
      border-color: #fff;
    }

    /* Submit */
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #f0c040;
      color: #1a1a2e;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.05em;
    }
    button[type="submit"]:active {
      background: #c8a000;
    }
  </style>
</head>
<body>
  <h1>⚔️ DSA Tracker</h1>

  <div class="section">
    <h2>Modus</h2>

    <div class="radio-option">
      <input type="radio" id="mode0" name="Mode" value="0" />
      <label for="mode0">Nur Lebenspunkte (LeP)</label>
    </div>
    <div class="radio-option">
      <input type="radio" id="mode1" name="Mode" value="1" />
      <label for="mode1">LeP + Astralpunkte (AsP)</label>
    </div>
    <div class="radio-option">
      <input type="radio" id="mode2" name="Mode" value="2" />
      <label for="mode2">LeP + Karmalpunkte (KaP)</label>
    </div>
  </div>

  <div class="section">
    <h2>Maximalwerte</h2>

    <div class="input-row">
      <span class="stat-label">LeP</span>
      <label for="LepMax">Lebenspunkte</label>
      <input type="number" id="LepMax" min="1" max="999" value="25" />
    </div>
    <div class="input-row">
      <span class="stat-label">AsP</span>
      <label for="AspMax">Astralpunkte</label>
      <input type="number" id="AspMax" min="1" max="999" value="40" />
    </div>
    <div class="input-row">
      <span class="stat-label">KaP</span>
      <label for="KapMax">Karmalpunkte</label>
      <input type="number" id="KapMax" min="1" max="999" value="20" />
    </div>
  </div>

  <button type="submit" onclick="saveConfig()">✓ Speichern</button>

<script>
  // URL-Parameter auslesen und Formular vorbelegen
  (function() {
    var params = {};
    window.location.search.replace(/[?&]([^=&]+)=([^&]*)/g, function(_, k, v) {
      params[k] = decodeURIComponent(v);
    });

    var mode = params.Mode || '1';
    var radio = document.querySelector('input[name="Mode"][value="' + mode + '"]');
    if (radio) radio.checked = true;

    if (params.LepMax) document.getElementById('LepMax').value = params.LepMax;
    if (params.AspMax) document.getElementById('AspMax').value = params.AspMax;
    if (params.KapMax) document.getElementById('KapMax').value = params.KapMax;
  })();

  // return_to aus URL lesen (Emulator vs. echte Uhr)
  function getQueryParam(variable, defaultValue) {
    var query = location.search.substring(1);
    var vars = query.split('&');
    for (var i = 0; i < vars.length; i++) {
      var pair = vars[i].split('=');
      if (pair[0] === variable) {
        return decodeURIComponent(pair[1]);
      }
    }
    return defaultValue;
  }

  function saveConfig() {
    var modeEl = document.querySelector('input[name="Mode"]:checked');
    if (!modeEl) {
      alert('Bitte einen Modus auswählen.');
      return;
    }

    var config = {
      Mode:   modeEl.value,
      LepMax: document.getElementById('LepMax').value || '25',
      AspMax: document.getElementById('AspMax').value || '40',
      KapMax: document.getElementById('KapMax').value || '20'
    };

    // Korrekt: return_to aus URL-Parameter lesen!
    var return_to = getQueryParam('return_to', 'pebblejs://close#');
    document.location = return_to + encodeURIComponent(JSON.stringify(config));
  }
</script>
</body>
</html>
